<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#2d8a4e" stroke="#1a5c32" stroke-width="3"/>
  
  <!-- Soccer ball -->
  <circle cx="64" cy="64" r="34" fill="white" stroke="#333" stroke-width="2"/>
  
  <!-- Pentagon patches on ball -->
  <polygon points="64,38 72,44 69,54 59,54 56,44" fill="#333"/>
  <polygon points="82,58 84,68 76,74 70,68 74,58" fill="#333"/>
  <polygon points="46,58 54,58 58,68 52,74 44,68" fill="#333"/>
  <polygon points="52,82 58,76 70,76 76,82 72,90" fill="#333" opacity="0.7"/>
  
  <!-- Crosshair / marker overlay -->
  <line x1="64" y1="20" x2="64" y2="42" stroke="#ff3333" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="86" x2="64" y2="108" stroke="#ff3333" stroke-width="3" stroke-linecap="round"/>
  <line x1="20" y1="64" x2="42" y2="64" stroke="#ff3333" stroke-width="3" stroke-linecap="round"/>
  <line x1="86" y1="64" x2="108" y2="64" stroke="#ff3333" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Center dot -->
  <circle cx="64" cy="64" r="3" fill="#ff3333"/>
  
  <!-- Corner brackets for "targeting" look -->
  <polyline points="28,40 28,28 40,28" fill="none" stroke="#ff3333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="88,28 100,28 100,40" fill="none" stroke="#ff3333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="100,88 100,100 88,100" fill="none" stroke="#ff3333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="40,100 28,100 28,88" fill="none" stroke="#ff3333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
