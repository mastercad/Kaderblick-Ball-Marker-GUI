name: Build and Release App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            artifact: kaderblick-ballmarker-linux
            package: kaderblick-ballmarker-linux.tar.gz
          - name: Windows
            os: windows-latest
            artifact: kaderblick-ballmarker-windows
            package: kaderblick-ballmarker-windows.zip
          - name: macOS
            os: macos-latest
            artifact: kaderblick-ballmarker-macos
            package: kaderblick-ballmarker-macos.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install Linux runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-build.txt

      - name: Verify runtime data is not bundled
        shell: bash
        run: |
          if grep -E 'ROOT / "data"|ROOT / "models"|\.pt' ballmarker_gui.spec; then
            echo "Runtime data or model files must not be bundled."
            exit 1
          fi

      - name: Build application
        run: pyinstaller --clean --noconfirm ballmarker_gui.spec

      - name: Package Linux build
        if: runner.os == 'Linux'
        run: tar -czf "${{ matrix.package }}" -C dist "Kaderblick BallMarker"

      - name: Package Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/Kaderblick BallMarker" -DestinationPath "${{ matrix.package }}" -Force

      - name: Package macOS build
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent "dist/Kaderblick BallMarker.app" "${{ matrix.package }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.package }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged builds
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: build-${{ github.run_number }}
          name: Main build ${{ github.run_number }}
          commit: ${{ github.sha }}
          artifacts: release-assets/*
          makeLatest: true
          body: |
            Automated build from main.

            Commit: ${{ github.sha }}
