name: Build and Release App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: Kaderblick BallMarker
  APP_ID: kaderblick-ballmarker
  APP_VERSION: 0.0.${{ github.run_number }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            artifact: kaderblick-ballmarker-linux
          - name: Windows
            os: windows-latest
            artifact: kaderblick-ballmarker-windows
          - name: macOS
            os: macos-latest
            artifact: kaderblick-ballmarker-macos

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux runtime libraries
        if: runner.os == 'Linux'
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          sudo apt-get update
          sudo apt-get install -y dpkg-dev libegl1 libgl1 libxkbcommon-x11-0
          df -h

      - name: Install Windows installer tooling
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Install app Python dependencies
        run: python -m pip install --no-cache-dir -r requirements-build.txt

      - name: Verify runtime data is not bundled
        shell: bash
        run: |
          if grep -E 'ROOT / "data"|ROOT / "models"|\.pt' ballmarker_gui.spec; then
            echo "Runtime data or model files must not be bundled."
            exit 1
          fi

      - name: Build application
        run: pyinstaller --clean --noconfirm ballmarker_gui.spec

      - name: Package Linux portable and installer
        if: runner.os == 'Linux'
        run: |
          mkdir -p release
          tar -czf "release/kaderblick-ballmarker-linux-portable.tar.gz" -C dist "${APP_NAME}"

          mkdir -p deb/DEBIAN
          mkdir -p deb/opt/kaderblick-ballmarker
          mkdir -p deb/usr/bin
          mkdir -p deb/usr/share/applications
          mkdir -p deb/usr/share/icons/hicolor/512x512/apps

          cp -a "dist/${APP_NAME}/." deb/opt/kaderblick-ballmarker/
          install -m 644 assets/icon_512.png deb/usr/share/icons/hicolor/512x512/apps/kaderblick-ballmarker.png
          ln -s "/opt/kaderblick-ballmarker/${APP_NAME}" deb/usr/bin/kaderblick-ballmarker

          cat > deb/DEBIAN/control <<EOF
          Package: kaderblick-ballmarker
          Version: ${APP_VERSION}
          Section: video
          Priority: optional
          Architecture: amd64
          Maintainer: Kaderblick
          Depends: libc6, libegl1, libgl1, libxkbcommon-x11-0
          Description: Kaderblick BallMarker desktop application
           Desktop application for marking ball positions in football videos.
          EOF

          cat > deb/usr/share/applications/kaderblick-ballmarker.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=Kaderblick BallMarker
          Comment=Mark ball positions in football videos
          Exec="/opt/kaderblick-ballmarker/${APP_NAME}"
          Icon=kaderblick-ballmarker
          Terminal=false
          Categories=AudioVideo;Video;
          EOF

          dpkg-deb --build deb "release/kaderblick-ballmarker-linux-installer.deb"

      - name: Package Windows portable and installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path "dist/${env:APP_NAME}" -DestinationPath "release/kaderblick-ballmarker-windows-portable.zip" -Force

          @"
          [Setup]
          AppId=kaderblick-ballmarker
          AppName=Kaderblick BallMarker
          AppVersion=${env:APP_VERSION}
          AppPublisher=Kaderblick
          DefaultDirName={autopf}\Kaderblick BallMarker
          DefaultGroupName=Kaderblick BallMarker
          OutputDir=release
          OutputBaseFilename=kaderblick-ballmarker-windows-installer
          Compression=lzma2
          SolidCompression=yes
          WizardStyle=modern
          SetupIconFile=assets\icon.ico
          UninstallDisplayIcon={app}\Kaderblick BallMarker.exe

          [Files]
          Source: "dist\Kaderblick BallMarker\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\Kaderblick BallMarker"; Filename: "{app}\Kaderblick BallMarker.exe"
          Name: "{autodesktop}\Kaderblick BallMarker"; Filename: "{app}\Kaderblick BallMarker.exe"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "Desktop-Verknuepfung erstellen"; GroupDescription: "Optionale Verknuepfungen:"

          [Run]
          Filename: "{app}\Kaderblick BallMarker.exe"; Description: "Kaderblick BallMarker starten"; Flags: nowait postinstall skipifsilent
          "@ | Set-Content -Path installer.iss -Encoding UTF8

          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer.iss

      - name: Package macOS portable and installer
        if: runner.os == 'macOS'
        run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent "dist/${APP_NAME}.app" "release/kaderblick-ballmarker-macos-portable.zip"
          pkgbuild \
            --component "dist/${APP_NAME}.app" \
            --install-location /Applications \
            --identifier de.kaderblick.ballmarker \
            --version "${APP_VERSION}" \
            "release/kaderblick-ballmarker-macos-installer.pkg"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged builds
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: build-${{ github.run_number }}
          name: Main build ${{ github.run_number }}
          commit: ${{ github.sha }}
          artifacts: release-assets/*
          makeLatest: true
          body: |
            Automated build from main.

            Commit: ${{ github.sha }}
